
[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .

# Alembic won’t use this URL because env.py overrides with settings.DATABASE_URL,
# but we keep a placeholder to satisfy config parsing.
sqlalchemy.url = postgresql+asyncpg://user:userpassword@localhost:5432/productdb
[loggers]
keys = root,sqlalchemy,alembic
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = WARN
handlers = console
qualname =
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
[logger_alembic]
level = INFO
handlers =
qualname = alembic
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
